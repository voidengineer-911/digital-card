<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<title>Ahmad Sharaf — Digital Card</title>
<meta name="hz:slide-selector" content=".card" />
<meta name="hz:canvas-width" content="1080" />
<meta name="hz:canvas-height" content="1920" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Tajawal:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; }
.card{
  position:relative; width:1080px; height:1920px; overflow:hidden;
  background:#000000; color:#F4F4F8;
  font-family:'Space Grotesk',sans-serif;
  display:flex; flex-direction:column; padding:104px 92px 96px;
}
.card::before{ content:""; position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(720px 560px at 14% 4%, rgba(255,255,255,.09), transparent 70%),
    radial-gradient(820px 680px at 92% 100%, rgba(255,110,1,.14), transparent 68%);}
.grid{position:absolute; inset:0; z-index:0; opacity:.5;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:100% 80px; -webkit-mask-image:linear-gradient(#000,transparent 70%,#000);}
.edge{position:absolute; inset:34px; border:1px solid rgba(255,255,255,.10); border-radius:34px; z-index:1;}
.faf path{fill:#ff6e01;}
.z{position:relative; z-index:3;}

/* top row */
.top{display:flex; align-items:center; justify-content:space-between;}
.emblem{display:flex; align-items:center; gap:20px;}
.emblem .xm{height:56px; width:auto; filter:drop-shadow(0 0 16px rgba(255,255,255,.14));}
.emblem .x{color:#5c5c68; font-weight:400; font-size:40px;}
.emblem .faf{height:52px; width:auto; filter:drop-shadow(0 0 18px rgba(255,110,1,.35));}
.tag{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:24px; letter-spacing:.14em;
  text-transform:uppercase; color:#0A0A0F; background:#fff; padding:12px 24px; border-radius:100px;}

/* hero */
.hero{margin-top:118px;}
.eyebrow{font-weight:600; font-size:28px; letter-spacing:.24em; text-transform:uppercase; color:#8f8f8f;}
.eyebrow .dot{display:inline-block; width:13px; height:13px; border-radius:50%; background:#ff6e01;
  box-shadow:0 0 16px #ff6e01; margin-inline-end:14px; vertical-align:middle;}
.name{margin-top:30px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:150px;
  line-height:.98; letter-spacing:-.03em; color:#FFFFFF;}
.name .sur{background:linear-gradient(100deg,#ffffff 0%,#c6c6c6 50%,#8f8f8f 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
.name-ar{margin-top:20px; font-family:'Cairo',sans-serif; font-weight:700; font-size:52px;
  color:#6f6f7a; direction:rtl;}
.role{margin-top:34px; font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:39px;
  line-height:1.4; color:#B7B7C7;}
.role b{color:#fff; font-weight:600;}

/* ventures */
.ventures{margin-top:auto; display:flex; flex-direction:column; gap:26px;}
.vlabel{font-weight:600; font-size:24px; letter-spacing:.2em; text-transform:uppercase; color:#6a6a74; margin-bottom:6px;}
.v{display:flex; align-items:center; gap:36px; padding:38px 40px;
  border:1px solid rgba(255,255,255,.12); border-radius:26px; background:rgba(255,255,255,.028);}
.v.orange{border-color:rgba(255,110,1,.42); background:rgba(255,110,1,.06);}
.v .mk{width:120px; display:flex; align-items:center; justify-content:center; flex:0 0 120px;}
.v .mk img{height:82px; width:auto;}
.v .mk .faf{height:76px; width:auto; filter:drop-shadow(0 0 20px rgba(255,110,1,.4));}
.v .txt{display:flex; flex-direction:column; gap:9px; flex:1;}
.v .vt{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:56px; letter-spacing:-.02em; color:#fff; line-height:1;}
.v .vs{font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:27px; letter-spacing:.12em; text-transform:uppercase; color:#8f8f8f;}
.v .vlink{font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:32px; color:#C7C7D4; margin-top:4px;}
.v.orange .vlink{color:#ff8a3d;}

/* footer */
.foot{margin-top:56px; display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.10); padding-top:40px;}
.foot .contact{display:flex; flex-direction:column; gap:8px;}
.foot .contact .l{font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:32px; color:#EDEDED;}
.foot .contact .s{font-family:'Space Grotesk',sans-serif; font-weight:400; font-size:26px; color:#6a6a74; letter-spacing:.02em;}
.foot .slogan{font-family:'Tajawal',sans-serif; font-weight:500; font-size:29px; color:#8f8f8f; text-align:right; direction:rtl; max-width:470px; line-height:1.45; white-space:nowrap;}
</style>
</head>
<body>

</body>
</html>
