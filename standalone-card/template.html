<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ahmad Sharaf — Digital Card</title>
<style>
/* Single, deliberately committed dark theme — mirrors the mypovonai brand world.
   Neutrals carry a faint warm bias toward the Force AI orange accent. */
:root{
  --bg:#060506; --bg2:#0d0c0d; --card:#111011; --line:rgba(255,255,255,.09);
  --line2:rgba(255,255,255,.14); --ink:#f4f2f3; --sub:#a5a1a4; --mut:#6f6b6e;
  --accent:#ff6e01; --accent-ink:#0a0708;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(760px 520px at 50% -6%, rgba(255,255,255,.06), transparent 70%),
    radial-gradient(680px 560px at 50% 108%, rgba(255,110,1,.12), transparent 70%),
    var(--bg);
  min-height:100vh; color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; justify-content:center; padding:28px 18px 40px;
}
.wrap{width:100%; max-width:430px; display:flex; flex-direction:column; gap:20px}

.hero{position:relative; border-radius:26px; overflow:hidden;
  border:1px solid var(--line); box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4);}
.hero img{display:block; width:100%; height:auto}

.actions{display:flex; flex-direction:column; gap:11px}
.btn{
  display:flex; align-items:center; gap:14px; width:100%;
  padding:17px 20px; border-radius:16px; border:1px solid var(--line2);
  background:var(--bg2); color:var(--ink); text-decoration:none;
  font-size:16.5px; font-weight:600; letter-spacing:-.01em; cursor:pointer;
  transition:transform .12s ease, background .18s ease, border-color .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:var(--card); border-color:rgba(255,255,255,.24)}
.btn:active{transform:scale(.985)}
.btn:focus-visible{outline:2px solid var(--accent); outline-offset:3px}
.btn .ic{flex:0 0 22px; width:22px; height:22px; color:var(--sub)}
.btn .lab{flex:1; display:flex; flex-direction:column; gap:2px}
.btn .lab small{font-weight:500; font-size:12.5px; letter-spacing:.02em; color:var(--mut)}
.btn .chev{flex:0 0 auto; color:var(--mut)}
.btn.primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
.btn.primary .ic,.btn.primary .lab small{color:rgba(10,7,8,.62)}
.btn.primary:hover{background:#ff7d1c; border-color:#ff7d1c}
.btn.primary:focus-visible{outline-color:#fff}

.qr{display:flex; align-items:center; gap:18px; padding:16px;
  border:1px solid var(--line); border-radius:20px; background:var(--bg2)}
.qr .tile{flex:0 0 auto; background:#F4F1EA; padding:11px; border-radius:16px; line-height:0}
.qr .tile img{display:block; width:124px; height:124px; image-rendering:auto}
.qr .cap{display:flex; flex-direction:column; gap:5px}
.qr .cap b{font-size:15.5px; font-weight:650; letter-spacing:-.01em}
.qr .cap span{font-size:13px; color:var(--sub); line-height:1.45}
.qr .cap .ar{direction:rtl; color:var(--mut); font-size:12.5px}

.foot{display:flex; align-items:center; justify-content:center; gap:9px;
  color:var(--mut); font-size:12.5px; letter-spacing:.04em; margin-top:2px}
.foot .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent)}

.toast{position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px);
  background:#fff; color:#0a0708; font-weight:650; font-size:14px;
  padding:12px 20px; border-radius:100px; box-shadow:0 12px 40px rgba(0,0,0,.5);
  opacity:0; pointer-events:none; transition:opacity .22s ease, transform .22s ease; z-index:50}
.toast.on{opacity:1; transform:translate(-50%,0)}
@media (prefers-reduced-motion:reduce){ .btn,.toast{transition:none} }
</style>
</head>
<body>
<main class="wrap">
  <div class="hero"><img src="__CARD_IMG__" alt="Ahmad Sharaf — Founder, Force AI · Creator, mypovonai" /></div>

  <section class="actions" aria-label="Card actions">
    <button class="btn primary" id="saveBtn" type="button">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      <span class="lab">Save to phone<small>Add me to your contacts</small></span>
    </button>

    <a class="btn" href="https://force-ai.co" target="_blank" rel="noopener">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 0 20 15.3 15.3 0 0 1 0-20"/></svg>
      <span class="lab">force-ai.co<small>AI-first software company</small></span>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/mypovonai" target="_blank" rel="noopener">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
      <span class="lab">@mypovonai<small>AI from my point of view</small></span>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <a class="btn" href="mailto:a.sharaf@force-ai.co">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M3 6.5l9 6 9-6"/></svg>
      <span class="lab">Email me<small>a.sharaf@force-ai.co</small></span>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <a class="btn" href="https://wa.me/96541169141" target="_blank" rel="noopener">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1.4-4.1A8 8 0 1 1 8.1 18.6L4 20z"/><path d="M9 9.5c.4 2.2 2.3 4.1 4.5 4.5.5.1 1-.2 1.2-.7l.2-.6-1.8-1-.7.7c-.8-.4-1.5-1.1-1.9-1.9l.7-.7-1-1.8-.6.2c-.5.2-.8.7-.7 1.2z" fill="currentColor" stroke="none"/></svg>
      <span class="lab">WhatsApp<small>+965 4116 9141</small></span>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </a>

    <button class="btn" id="shareBtn" type="button">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      <span class="lab">Share this card<small>Send the link to anyone</small></span>
    </button>
  </section>

  <section class="qr" aria-label="Scan to save contact">
    <div class="tile"><img src="__QR_IMG__" alt="QR code to save Ahmad Sharaf's contact" /></div>
    <div class="cap">
      <b>Scan to save</b>
      <span>Point a camera here to add me as a contact.</span>
      <span class="ar">امسح لحفظ جهة الاتصال</span>
    </div>
  </section>

  <div class="foot"><span class="dot"></span> AI FROM MY POV · force-ai.co</div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite">Link copied</div>

<script>
(function(){
  var vcard = "__VCARD__";
  var toast = document.getElementById('toast'), t;
  function pop(msg){ toast.textContent = msg; toast.classList.add('on'); clearTimeout(t); t=setTimeout(function(){toast.classList.remove('on')},1900); }

  document.getElementById('saveBtn').addEventListener('click', function(){
    try{
      var blob = new Blob([vcard], {type:'text/vcard;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'Ahmad-Sharaf.vcf';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
      pop('Contact ready — open it to save');
    }catch(e){ pop('Could not create contact'); }
  });

  document.getElementById('shareBtn').addEventListener('click', async function(){
    var data = { title:'Ahmad Sharaf', text:'Ahmad Sharaf — Founder, Force AI · Creator, mypovonai', url: location.href };
    if(navigator.share){ try{ await navigator.share(data); return; }catch(e){ if(e && e.name==='AbortError') return; } }
    try{ await navigator.clipboard.writeText(location.href); pop('Link copied'); }
    catch(e){ pop(location.href); }
  });
})();
</script>
</body>
</html>
