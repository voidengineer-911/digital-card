<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ahmad Sharaf — Digital Card</title>
<style>
/* Single, deliberately committed dark theme — mirrors the mypovonai brand world.
   Neutrals carry a faint warm bias toward the Force AI orange accent. */
:root{
  --bg:#060506; --bg2:#0d0c0d; --card:#111011; --line:rgba(255,255,255,.09);
  --line2:rgba(255,255,255,.14); --ink:#f4f2f3; --sub:#a5a1a4; --mut:#6f6b6e;
  --accent:#ff6e01; --accent-ink:#0a0708;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(760px 520px at 50% -6%, rgba(255,255,255,.06), transparent 70%),
    radial-gradient(680px 560px at 50% 108%, rgba(255,110,1,.12), transparent 70%),
    var(--bg);
  min-height:100vh; color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; justify-content:center; padding:28px 18px 40px;
}
.wrap{width:100%; max-width:430px; display:flex; flex-direction:column; gap:20px}

.hero{position:relative; border-radius:26px; overflow:hidden;
  border:1px solid var(--line); box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,0,0,.4);}
.hero img{display:block; width:100%; height:auto}

.actions{display:flex; flex-direction:column; gap:11px}
.btn{
  display:flex; align-items:center; gap:14px; width:100%;
  padding:17px 20px; border-radius:16px; border:1px solid var(--line2);
  background:var(--bg2); color:var(--ink); text-decoration:none;
  font-size:16.5px; font-weight:600; letter-spacing:-.01em; cursor:pointer;
  transition:transform .12s ease, background .18s ease, border-color .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{background:var(--card); border-color:rgba(255,255,255,.24)}
.btn:active{transform:scale(.985)}
.btn:focus-visible{outline:2px solid var(--accent); outline-offset:3px}
.btn .ic{flex:0 0 22px; width:22px; height:22px; color:var(--sub)}
.btn .lab{flex:1; display:flex; flex-direction:column; gap:2px}
.btn .lab small{font-weight:500; font-size:12.5px; letter-spacing:.02em; color:var(--mut)}
.btn .chev{flex:0 0 auto; color:var(--mut)}
.btn.primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink)}
.btn.primary .ic,.btn.primary .lab small{color:rgba(10,7,8,.62)}
.btn.primary:hover{background:#ff7d1c; border-color:#ff7d1c}
.btn.primary:focus-visible{outline-color:#fff}

.qr{display:flex; align-items:center; gap:18px; padding:16px;
  border:1px solid var(--line); border-radius:20px; background:var(--bg2)}
.qr .tile{flex:0 0 auto; background:#F4F1EA; padding:11px; border-radius:16px; line-height:0}
.qr .tile img{display:block; width:124px; height:124px; image-rendering:auto}
.qr .cap{display:flex; flex-direction:column; gap:5px}
.qr .cap b{font-size:15.5px; font-weight:650; letter-spacing:-.01em}
.qr .cap span{font-size:13px; color:var(--sub); line-height:1.45}
.qr .cap .ar{direction:rtl; color:var(--mut); font-size:12.5px}

.foot{display:flex; align-items:center; justify-content:center; gap:9px;
  color:var(--mut); font-size:12.5px; letter-spacing:.04em; margin-top:2px}
.foot .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent)}

.toast{position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px);
  background:#fff; color:#0a0708; font-weight:650; font-size:14px;
  padding:12px 20px; border-radius:100px; box-shadow:0 12px 40px rgba(0,0,0,.5);
  opacity:0; pointer-events:none; transition:opacity .22s ease, transform .22s ease; z-index:50}
.toast.on{opacity:1; transform:translate(-50%,0)}
@media (prefers-reduced-motion:reduce){ .btn,.toast{transition:none} }
</style>
</head>
